[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tinli-schema"
version = "0.1.0"
description = "Tinli unified market data models (pydantic) + generated TS types"
requires-python = ">=3.12"
dependencies = ["pydantic>=2.7"]

[tool.hatch.build.targets.wheel]
packages = ["tinli_schema"]
