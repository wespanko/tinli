# Self-reported positions for the risk engine (/v1/risk). v0 has no venue
# auth: Tinli never sees your account — edit this file by hand. Reloaded on
# every request; no restart needed.
#
# Fields:
#   market_id:    venue-qualified id, 'kalshi:<ticker>' or 'polymarket:<conditionId>'
#   side:         yes | no  (which outcome you hold)
#   contracts:    position size, contracts/shares (quote it — keep it a string)
#   entry_price:  price paid per contract for `side`, dollars 0-1 (string)
#   est_prob:     OPTIONAL — your own estimate of the YES probability, 0-1.
#                 Enables Kelly sizing. Leave out to skip Kelly for a position;
#                 it is never inferred from market prices.
#   notes:        free text
#
# The positions below are an EXAMPLE BOOK for demo mode (they reference
# markets in the curated pair map, so they mark against fixtures too).
# Replace them with your own.

positions:
  # A cross-venue lock: YES on Kalshi + NO on Polymarket, same event.
  - market_id: "kalshi:KXMENWORLDCUP-26-ES"
    side: yes
    contracts: "100"
    entry_price: "0.52"
    notes: "example: YES leg of Spain WC-winner lock"
  - market_id: "polymarket:0x7976b8dbacf9077eb1453a62bcefd6ab2df199acd28aad276ff0d920d6992892"
    side: no
    contracts: "100"
    entry_price: "0.45"
    notes: "example: NO leg of Spain WC-winner lock"

  # A directional bet with a user probability estimate (enables Kelly).
  - market_id: "kalshi:KXFEDDECISION-26JUL-H0"
    side: yes
    contracts: "250"
    entry_price: "0.55"
    est_prob: "0.97"
    notes: "example: directional Fed hold, user more confident than the market"
